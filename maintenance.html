<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>האתר בשיפוצים | MP</title>
    <link rel="icon" href="/icon/Website icon/Websiteicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

        :root{
            --bg:#0a0e17;
            --card:rgba(255,255,255,.04);
            --border:rgba(255,255,255,.08);
            --accent:#3b82f6;
            --accent2:#8b5cf6;
            --glow:rgba(59,130,246,.25);
            --text:#e2e8f0;
            --text-dim:#64748b;
        }

        body{
            font-family:'Heebo',sans-serif;
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            overflow:hidden;
            position:relative;
        }

        /* animated background grid */
        .grid-bg{
            position:fixed;inset:0;z-index:0;
            background-image:
                linear-gradient(rgba(59,130,246,.06) 1px,transparent 1px),
                linear-gradient(90deg,rgba(59,130,246,.06) 1px,transparent 1px);
            background-size:60px 60px;
            animation:gridMove 20s linear infinite;
        }
        @keyframes gridMove{
            0%{transform:translate(0,0)}
            100%{transform:translate(60px,60px)}
        }

        /* floating orbs */
        .orb{
            position:fixed;border-radius:50%;filter:blur(80px);opacity:.35;z-index:0;
            animation:orbFloat 8s ease-in-out infinite alternate;
        }
        .orb-1{width:400px;height:400px;background:var(--accent);top:-10%;right:-10%;animation-delay:0s}
        .orb-2{width:350px;height:350px;background:var(--accent2);bottom:-15%;left:-10%;animation-delay:2s}
        .orb-3{width:250px;height:250px;background:#06b6d4;top:50%;left:50%;animation-delay:4s}
        @keyframes orbFloat{
            0%{transform:translate(0,0) scale(1)}
            100%{transform:translate(30px,-40px) scale(1.15)}
        }

        .container{
            position:relative;z-index:1;
            text-align:center;
            max-width:620px;
            padding:40px 24px;
        }

        /* icon with pulse ring */
        .icon-wrap{
            position:relative;
            display:inline-block;
            margin-bottom:32px;
        }
        .icon-wrap img{
            width:90px;height:90px;
            border-radius:20px;
            box-shadow:0 0 40px var(--glow),0 8px 32px rgba(0,0,0,.4);
            position:relative;z-index:1;
        }
        .pulse-ring{
            position:absolute;inset:-12px;
            border:2px solid var(--accent);
            border-radius:26px;
            animation:pulse 2.5s ease-out infinite;
        }
        .pulse-ring:nth-child(2){animation-delay:.8s}
        .pulse-ring:nth-child(3){animation-delay:1.6s}
        @keyframes pulse{
            0%{transform:scale(1);opacity:.6}
            100%{transform:scale(1.5);opacity:0}
        }

        /* gear animation */
        .gears{
            display:flex;justify-content:center;gap:6px;
            margin-bottom:28px;
        }
        .gear{
            font-size:32px;
            color:var(--accent);
            animation:spin 4s linear infinite;
            filter:drop-shadow(0 0 8px var(--glow));
        }
        .gear:nth-child(2){
            animation-direction:reverse;
            animation-duration:3s;
            color:var(--accent2);
            font-size:24px;
            margin-top:8px;
            filter:drop-shadow(0 0 8px rgba(139,92,246,.3));
        }
        .gear:nth-child(3){
            animation-duration:5s;
            font-size:28px;
        }
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

        h1{
            font-size:clamp(2rem,5vw,3rem);
            font-weight:800;
            margin-bottom:12px;
            background:linear-gradient(135deg,#fff 0%,var(--accent) 50%,var(--accent2) 100%);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
            line-height:1.3;
        }

        .subtitle{
            font-size:clamp(1rem,2.5vw,1.25rem);
            color:var(--text-dim);
            font-weight:300;
            margin-bottom:36px;
            line-height:1.7;
        }

        /* progress bar */
        .progress-wrap{
            background:var(--card);
            border:1px solid var(--border);
            border-radius:100px;
            padding:4px;
            margin-bottom:36px;
            overflow:hidden;
        }
        .progress-bar{
            height:10px;
            border-radius:100px;
            background:linear-gradient(90deg,var(--accent),var(--accent2));
            width:0%;
            animation:progressFill 3s ease-out forwards;
            box-shadow:0 0 16px var(--glow);
            position:relative;
        }
        .progress-bar::after{
            content:'';
            position:absolute;
            inset:0;
            background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
            animation:shimmer 2s linear infinite;
        }
        @keyframes progressFill{0%{width:0}100%{width:72%}}
        @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

        .progress-label{
            display:flex;justify-content:space-between;
            margin-top:8px;padding:0 4px;
            font-size:.85rem;color:var(--text-dim);
        }

        /* info cards */
        .info-row{
            display:flex;gap:12px;
            margin-bottom:36px;
            flex-wrap:wrap;
            justify-content:center;
        }
        .info-card{
            background:var(--card);
            border:1px solid var(--border);
            border-radius:14px;
            padding:16px 20px;
            flex:1;min-width:140px;
            backdrop-filter:blur(12px);
            transition:border-color .3s;
        }
        .info-card:hover{border-color:var(--accent)}
        .info-card .ic-icon{font-size:1.5rem;margin-bottom:6px}
        .info-card .ic-label{font-size:.75rem;color:var(--text-dim);margin-bottom:2px}
        .info-card .ic-value{font-size:1rem;font-weight:600}

        /* developer footer */
        .dev{
            display:inline-flex;
            align-items:center;
            gap:8px;
            padding:10px 20px;
            background:var(--card);
            border:1px solid var(--border);
            border-radius:100px;
            font-size:.85rem;
            color:var(--text-dim);
            backdrop-filter:blur(12px);
        }
        .dev img{width:22px;height:22px;border-radius:6px}

        /* responsive */
        @media(max-width:480px){
            .info-row{flex-direction:column;align-items:center}
            .info-card{width:100%;max-width:260px}
            .gears .gear{font-size:24px}
            .gears .gear:nth-child(2){font-size:18px}
            .gears .gear:nth-child(3){font-size:22px}
        }

        /* admin hint - very subtle */
        .admin-hint{
            position:fixed;bottom:8px;left:50%;transform:translateX(-50%);
            font-size:.65rem;color:rgba(255,255,255,.08);
            z-index:10;pointer-events:none;
            transition:color .3s;
        }
        body:hover .admin-hint{color:rgba(255,255,255,.15)}
    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="container">

        <div class="icon-wrap">
            <span class="pulse-ring"></span>
            <span class="pulse-ring"></span>
            <span class="pulse-ring"></span>
            <img src="/icon/Website icon/Websiteicon.png" alt="MP">
        </div>

        <div class="gears">
            <span class="gear">⚙</span>
            <span class="gear">⚙</span>
            <span class="gear">⚙</span>
        </div>

        <h1>האתר בשיפוצים</h1>
        <p class="subtitle">
            אנחנו עובדים על שדרוגים ושיפורים כדי להעניק לכם חוויה טובה יותר.
            <br>נחזור בקרוב!
        </p>

        <div class="progress-wrap">
            <div class="progress-bar"></div>
        </div>
        <div class="progress-label">
            <span>התקדמות השיפוצים</span>
            <span id="progress-pct">0%</span>
        </div>

        <div class="info-row">
            <div class="info-card">
                <div class="ic-icon">🔧</div>
                <div class="ic-label">סטטוס</div>
                <div class="ic-value">בשיפוצים</div>
            </div>
            <div class="info-card">
                <div class="ic-icon">⏱️</div>
                <div class="ic-label">זמן משוער</div>
                <div class="ic-value">בקרוב</div>
            </div>
            <div class="info-card">
                <div class="ic-icon">✨</div>
                <div class="ic-label">מה חדש</div>
                <div class="ic-value">שדרוגים</div>
            </div>
        </div>

        <div class="dev">
            <img src="/icon/Website icon/Websiteicon.png" alt="MP">
            <span>Michael Papismedov — MP</span>
        </div>

    </div>

    <div class="admin-hint">Ctrl+Shift+M — ניהול מצב שיפוצים</div>

    <script>
    (function(){
        var pct = document.getElementById('progress-pct');
        var count = 0;
        var target = 72;
        var timer = setInterval(function(){
            count += 1;
            if(count > target){ clearInterval(timer); return; }
            pct.textContent = count + '%';
        }, 3000 / target);

        document.addEventListener('keydown', function(e){
            if(e.ctrlKey && e.shiftKey && e.key === 'M'){
                e.preventDefault();
                var current = localStorage.getItem('mp-maintenance');
                if(current === 'on'){
                    localStorage.removeItem('mp-maintenance');
                    alert('מצב שיפוצים כובה — האתר חזר לפעולה רגילה');
                    window.location.href = '/index.html';
                } else {
                    localStorage.setItem('mp-maintenance', 'on');
                    alert('מצב שיפוצים הופעל — מבקרים יראו את עמוד השיפוצים');
                }
            }
        });
    })();
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💻</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>טניס שולחן</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
    <script>(function(){var t=localStorage.getItem("mp-theme");if(t)document.documentElement.setAttribute("data-theme",t)})()</script>
    <link rel="stylesheet" href="/theme-switcher.css">
    <link rel="stylesheet" href="/mp-rights-notice.css">
    <link rel="stylesheet" href="/mp-nav.css">
</head>
<body>
    <div class="wrapper">
        <header class="hud">
            <h1>טניס שולחן</h1>
            <div class="scoreboard">
                <span class="score-item blue">W/S: <strong id="leftScore">0</strong></span>
                <span class="score-vs">vs</span>
                <span class="score-item red">↑/↓: <strong id="rightScore">0</strong></span>
            </div>
        </header>
        <canvas id="pong"></canvas>
        <p class="touch-hint">גע בצד שמאל/ימין של המסך כדי להזיז את המחבטים</p>
        <div class="controls">
            <button class="ctrl-btn" id="startBtn">התחל</button>
            <button class="ctrl-btn ctrl-btn--dim" id="stopBtn">עצור</button>
            <a href="../../../index.html" class="back-link">← חזרה</a>
        </div>
    </div>
    <footer style="text-align:center;color:#8b9cad;font-size:0.8rem;padding:1rem;"><img src="/icon/Website icon/Websiteicon.png" alt="MP" style="height:22px;width:22px;vertical-align:middle;margin-inline-end:6px;border-radius:4px;">Michael Papismedov - MP</footer>
    <script src="/theme-switcher.js"></script>
    <script src="/mp-security.js"></script>
    <script src="/mp-rights-notice.js"></script>
    <script src="/mp-nav.js"></script>
</body>
</html>

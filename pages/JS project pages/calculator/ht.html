<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💻</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>מחשבון</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./cs.css">
    <script src="./js.js" defer></script>
</head>
<body>
    <div class="calc">
        <div class="calc__display">
            <p class="value"></p>
        </div>
        <div class="calc__keys">
            <button id="cleanAll" class="key key--fn">CA</button>
            <button class="key key--fn">(</button>
            <button class="key key--fn">)</button>
            <button id="percent" class="key key--fn">%</button>
            <button class="key key--op">/</button>
            <button class="key">7</button>
            <button class="key">8</button>
            <button class="key">9</button>
            <button class="key key--op">*</button>
            <button class="key">4</button>
            <button class="key">5</button>
            <button class="key">6</button>
            <button class="key key--op">-</button>
            <button class="key">1</button>
            <button class="key">2</button>
            <button class="key">3</button>
            <button class="key key--op">+</button>
            <button class="key key--zero">0</button>
            <button class="key">.</button>
            <button id="Equality" class="key key--eq">=</button>
        </div>
    </div>
    <a href="../../../index.html" class="back-link">← חזרה לדף הבית</a>
</body>
</html>

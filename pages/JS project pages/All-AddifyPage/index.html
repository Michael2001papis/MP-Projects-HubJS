<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💻</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title> Users Management </title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./scripts/index.js" type="module" defer></script>

      <script>(function(){var t=localStorage.getItem("mp-theme");if(t)document.documentElement.setAttribute("data-theme",t)})()</script>
    <link rel="stylesheet" href="/theme-switcher.css">
    <link rel="stylesheet" href="/mp-rights-notice.css">
    <link rel="stylesheet" href="/mp-nav.css">
</head>
  <body dir="rtl">
    <div class="container-register">
      <h1>הרשמה</h1>
      <form class="register-form">
        <div class="form-control">
          <label for="firstName">שם פרטי</label>
          <input type="text" name="firstName" id="firstName" required minlength="2" maxlength="50" autocomplete="given-name" />
        </div>
        <div class="form-control">
          <label for="lastName">שם משפחה</label>
          <input type="text" name="lastName" id="lastName" required minlength="2" maxlength="50" autocomplete="family-name" />
        </div>
        <div class="form-control">
          <label for="register-email">אימייל</label>
          <input type="email" name="email" id="register-email" required maxlength="100" autocomplete="email" />
        </div>
        <div class="form-control">
          <label for="register-password">סיסמה</label>
          <input type="password" name="password" id="register-password" required minlength="8" maxlength="64" pattern="(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[!@#$%^&amp;*]).{8,}" title="8+ characters, uppercase, lowercase, digit, special char" autocomplete="new-password" />
        </div>
        <input type="submit" value="הרשם" />

      </form>
    </div>

    <div class="container-login">
      <h1>התחברות</h1>
      <form class="login-form">
        <div class="form-control">
          <label for="login-email">אימייל</label>
          <input type="email" name="email" id="login-email" required maxlength="100" autocomplete="email" />
        </div>
        <div class="form-control">
          <label for="login-password">סיסמה</label>
          <input type="password" name="password" id="login-password" required minlength="8" autocomplete="current-password" />
        </div>
        <button type="submit">התחבר</button>
      </form>
    </div>

    <div class="container-users">
      <h1>משתמשים</h1>

      <table id="users-table">
        <thead>
          <tr>
            <th>שם פרטי</th>
            <th>שם משפחה</th>
            <th>אימייל</th>
            <th>סיסמה</th>
            <th>סטטוס</th>
            <th>פעולות</th>
          </tr>
        </thead>
        <tbody id="users-table-body">
          <!-- content from js -->
        </tbody>
      </table>
    </div>
    <footer style="text-align:center;color:#8b9cad;font-size:0.8rem;padding:1rem;"><img src="/icon/Website icon/Websiteicon.png" alt="MP" style="height:22px;width:22px;vertical-align:middle;margin-inline-end:6px;border-radius:4px;">Michael Papismedov - MP</footer>
    
      <script src="/theme-switcher.js"></script>
    <script src="/mp-security.js"></script>
    <script src="/mp-rights-notice.js"></script>
    <script src="/mp-nav.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💻</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>סנייק</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./sty.css">
    <script src="./scr.js" defer></script>
    <script>(function(){var t=localStorage.getItem("mp-theme");if(t)document.documentElement.setAttribute("data-theme",t)})()</script>
    <link rel="stylesheet" href="/theme-switcher.css">
    <link rel="stylesheet" href="/mp-rights-notice.css">
</head>
<body>
    <div class="wrapper">
        <header class="hud">
            <h1>סנייק</h1>
            <span class="hud__score">ניקוד: <strong id="scoreDisplay">0</strong></span>
        </header>
        <canvas id="gameCanvas"></canvas>
        <div class="d-pad" id="dpad">
            <span class="d-pad__spacer"></span>
            <button class="d-pad__btn" data-dir="UP">▲</button>
            <span class="d-pad__spacer"></span>
            <button class="d-pad__btn" data-dir="LEFT">◀</button>
            <span class="d-pad__spacer"></span>
            <button class="d-pad__btn" data-dir="RIGHT">▶</button>
            <span class="d-pad__spacer"></span>
            <button class="d-pad__btn" data-dir="DOWN">▼</button>
            <span class="d-pad__spacer"></span>
        </div>
        <div class="controls">
            <button id="restartBtn">משחק חדש</button>
            <a href="../../../index.html" class="back-link">← חזרה</a>
        </div>
    </div>
    <footer style="text-align:center;color:#8b9cad;font-size:0.8rem;padding:1rem;"><img src="/icon/Website icon/Websiteicon.png" alt="MP" style="height:22px;width:22px;vertical-align:middle;margin-inline-end:6px;border-radius:4px;">Michael Papismedov - MP</footer>
    <script src="/theme-switcher.js"></script>
    <script src="/mp-security.js"></script>
    <script src="/mp-rights-notice.js"></script>
</body>
</html>

<!DOCTYPE html>
<!-- 
  כותרת: הגדרת מסמך HTML
  הערה: הקוד מתחיל בהצהרת DOCTYPE לציון מסמך HTML5.
-->
<html lang="en">
<head>
    <!-- כותרת: Head - הגדרות מטא וטיטל -->
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💻</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- כותרת: כותרת המסמך -->
    <title>User Login</title>

    <!-- כותרת: קישור לקובץ CSS -->
    <link rel="stylesheet" href="./Ul.css">

    <!-- כותרת: קישור לקובץ JavaScript עם defer כדי להמתין לטעינת הדף -->
    <script src="./Ul.js" defer></script>
    <script>(function(){var t=localStorage.getItem("mp-theme");if(t)document.documentElement.setAttribute("data-theme",t)})()</script>
    <link rel="stylesheet" href="/theme-switcher.css">
    <link rel="stylesheet" href="/mp-rights-notice.css">
    <link rel="stylesheet" href="/mp-nav.css">
</head>
<body>
    <!-- כותרת: תיבה ראשית - box001 -->
    <div id="box001">

        <!-- כותרת: כותרת ראשית בדף - User Login -->
        <h1 id="LO"> User Login </h1>

        <!-- כותרת: טופס התחברות -->
        <form action="" id="form">

          <!-- כותרת: שדה Username -->
          <div class="form-control">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required minlength="3" maxlength="50" autocomplete="username" />
            <p id="username-helper"></p>
          </div>

          <!-- כותרת: שדה Email -->
          <div class="form-control">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required maxlength="100" autocomplete="email" />
            <p id="email-helper"></p>
          </div>

          <!-- כותרת: שדה Password -->
          <div class="form-control">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="8" maxlength="64" pattern="(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[!@#$%^&amp;*]).{8,}" title="8+ characters, uppercase, lowercase, digit, special char" autocomplete="new-password" />
          </div>

          <!-- כותרת: כפתור שליחת טופס -->
          <input type="submit" />
        </form>
    </div>
    
    <!-- כותרת: אלמנט להצגת פלט -->
    <div id="output"></div>
    <footer style="text-align:center;color:#8b9cad;font-size:0.8rem;padding:1rem;"><img src="/icon/Website icon/Websiteicon.png" alt="MP" style="height:22px;width:22px;vertical-align:middle;margin-inline-end:6px;border-radius:4px;">Michael Papismedov - MP</footer>
    <script src="/theme-switcher.js"></script>
    <script src="/mp-security.js"></script>
    <script src="/mp-rights-notice.js"></script>
    <script src="/mp-nav.js"></script>
</body>
</html>

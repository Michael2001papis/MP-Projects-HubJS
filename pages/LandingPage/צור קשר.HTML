<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💻</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title> Registration-form </title>

    <link rel="stylesheet" href="/styles/Pj1/צור קשר.css">
    
</head>

<body>

    <header class="top-menu">

        <img src="/images/Firstprojectphotos/Michael.img.webp" alt="Logo">

        <a href="/index.html" target="_blank"> <button> בחזרה הביתה </button></a>
        

    </header>

    <div class="container">

        <h1> Registration form </h1>

        <form>
            
            <div class="form-section">

                <h2> פרטי משתמש </h2>

                <label for="name">שם מלא:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">אימייל:</label>
                <input type="email" id="email" name="email" required>

                <label for="password">סיסמה:</label>
                <input type="password" id="password" name="password" required>

            </div>

            <div class="form-section">

                <h2>העדפות</h2>

                <label for="color">בחר צבע:</label>

                <select id="color" name="color">
                    <option value="black">שחור</option>
                    <option value="red">אדום</option>
                    <option value="white">לבן</option>
                </select>

                <label for="font">בחר סוג כתיבה:</label>

                <select id="font" name="font">
                    <option value="Arial">Arial</option>
                    <option value="Verdana">Verdana</option>
                    <option value="Helvetica">Helvetica</option>
                </select>

            </div>

            <div class="form-section">

                <h2>כרטיס יום הולדת</h2>

                <label for="birthday">בחר תאריך:</label>

                <input type="date" id="birthday" name="birthday">

            </div>

            <button type="submit" class="button">שלח</button>

        </form>

    </div>
    <footer style="text-align:center;color:#8b9cad;font-size:0.8rem;padding:1rem;"><img src="/icon/Website icon/Websiteicon.png" alt="MP" style="height:22px;width:22px;vertical-align:middle;margin-inline-end:6px;border-radius:4px;">Michael Papismedov - MP</footer>

</body>

</html>
